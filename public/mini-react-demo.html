<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini React Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      padding: 24px;
      line-height: 1.6;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6ee7f7, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #888;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 20px;
    }

    .card h2 {
      font-size: 1rem;
      color: #a78bfa;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .card .desc {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 16px;
    }

    /* ── 通用组件样式 ── */
    button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      margin: 3px;
      transition: background 0.15s;
    }
    button:hover  { background: #4f52d4; }
    button.danger { background: #ef4444; }
    button.danger:hover { background: #dc2626; }
    button.ghost  { background: transparent; border: 1px solid #444; color: #ccc; }
    button.ghost:hover { border-color: #888; color: #fff; }

    input[type="text"], input[type="number"], input[type="email"] {
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8f0;
      padding: 6px 10px;
      font-size: 0.85rem;
      outline: none;
      width: 100%;
      margin-bottom: 8px;
    }
    input:focus { border-color: #6366f1; }

    label {
      display: block;
      font-size: 0.78rem;
      color: #a78bfa;
      margin-bottom: 3px;
    }

    .count-display {
      font-size: 2.5rem;
      font-weight: 700;
      color: #6ee7f7;
      text-align: center;
      padding: 8px 0;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #222;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item.done span  { text-decoration: line-through; color: #555; }

    .log {
      background: #111;
      border-radius: 6px;
      padding: 8px 10px;
      font-family: monospace;
      font-size: 0.8rem;
      color: #6ee7f7;
      max-height: 120px;
      overflow-y: auto;
      margin-top: 8px;
    }
    .log p { margin: 1px 0; }

    .progress {
      height: 8px;
      background: #1e293b;
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #06b6d4);
      transition: width 0.3s;
      border-radius: 4px;
    }

    .ctx-box {
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-size: 0.85rem;
      transition: all 0.3s;
    }

    .timer-display {
      font-size: 3rem;
      font-weight: 700;
      text-align: center;
      font-family: monospace;
      color: #6ee7f7;
      letter-spacing: 0.05em;
    }

    .memo-panel {
      background: #111827;
      border: 1px solid #263244;
      border-radius: 8px;
      padding: 10px;
      margin: 8px 0;
      color: #cbd5e1;
      font-size: 0.85rem;
    }

    .msg-list {
      height: 130px;
      overflow-y: auto;
      background: #111;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 8px;
    }
    .msg-item {
      padding: 3px 0;
      font-size: 0.8rem;
      color: #94a3b8;
      border-bottom: 1px solid #1e293b;
    }
    .msg-item:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <h1>Mini React</h1>
  <p class="subtitle">~1300 行代码实现 React 核心 · 架构与真实 React 保持一致</p>

  <div id="root"></div>

  <script src="/mini-react.js"></script>

  <script>
  const {
    createElement: h,
    Fragment,
    useState, useReducer, useEffect, useLayoutEffect, useInsertionEffect,
    useRef, useMemo, useCallback, useId,
    useContext, createContext, memo, createRef, Children,
    forwardRef, useImperativeHandle, useTransition, useDeferredValue,
    createPortal, lazy, Suspense, SuspenseList,
    useSyncExternalStore,
    Component, PureComponent,
    // 新增
    use, useOptimistic, useActionState,
    Profiler,
    mergeRefs, useMergedRef,
    PropTypes,
    createStore, combineReducers, thunkMiddleware, loggerMiddleware,
    renderToString, renderToStaticMarkup,
    // 自定义 hooks
    usePrevious, useToggle, useCounter,
    useDebounce, useThrottle,
    useInterval, useTimeout,
    useEventListener, useOnClickOutside, useKeyPress,
    useHover, useWindowSize, useMediaQuery,
    useLocalStorage, useFetch,
    useUpdateEffect, useForceUpdate, useCopyToClipboard,
  } = window.MiniReact
  const { render, flushSync, act, hydrateRoot } = window.MiniReactDOM

  // ─────────────────────────────────────────────────────────────
  // Demo 1：useState —— 基础状态管理
  // ─────────────────────────────────────────────────────────────
  function Counter() {
    const [count, setCount] = useState(0)

    return h('div', null,
      h('div', { className: 'count-display' }, count),
      h('div', { style: { textAlign: 'center' } },
        h('button', { onClick: () => setCount(c => c - 1) }, '−'),
        h('button', { onClick: () => setCount(0), className: 'ghost' }, '重置'),
        h('button', { onClick: () => setCount(c => c + 1) }, '+'),
      )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 2：列表渲染 + 条件渲染
  // ─────────────────────────────────────────────────────────────
  function TodoList() {
    const [todos, setTodos] = useState([
      { id: 1, text: '学习 Fiber 架构', done: true },
      { id: 2, text: '实现 Hooks',      done: false },
      { id: 3, text: '写单元测试',      done: false },
    ])
    const [input, setInput] = useState('')

    const add = () => {
      if (!input.trim()) return
      setTodos(prev => [...prev, { id: Date.now(), text: input.trim(), done: false }])
      setInput('')
    }

    const toggle = id => setTodos(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t))
    const remove = id => setTodos(prev => prev.filter(t => t.id !== id))

    return h('div', null,
      h('div', { style: { display: 'flex', gap: '6px', marginBottom: '8px' } },
        h('input', {
          type: 'text',
          style: { flex: 1, marginBottom: 0 },
          value: input,
          onInput: e => setInput(e.target.value),
          onKeyDown: e => e.key === 'Enter' && add(),
          placeholder: '回车 / 点击添加…',
        }),
        h('button', { onClick: add, style: { margin: 0 } }, '添加'),
      ),
      todos.length === 0
        ? h('p', { style: { color: '#555', fontSize: '0.85rem' } }, '暂无待办')
        : todos.map(todo =>
            h('div', { className: `todo-item${todo.done ? ' done' : ''}`, key: todo.id },
              h('input', { type: 'checkbox', checked: todo.done, onChange: () => toggle(todo.id), style: { cursor: 'pointer' } }),
              h('span', { style: { flex: 1 } }, todo.text),
              h('button', { onClick: () => remove(todo.id), className: 'danger', style: { padding: '2px 8px', fontSize: '0.75rem' } }, '×'),
            )
          ),
      h('p', { style: { fontSize: '0.75rem', color: '#555', marginTop: '8px' } },
        `共 ${todos.length} 项，已完成 ${todos.filter(t => t.done).length} 项`)
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 3：useEffect —— 副作用 + 清理函数
  // ─────────────────────────────────────────────────────────────
  function Timer() {
    const [running, setRunning] = useState(false)
    const [seconds, setSeconds] = useState(0)

    // running 变化时重新执行；返回清理函数 → 下次执行前 / 卸载时自动调用
    useEffect(() => {
      if (!running) return
      const id = setInterval(() => setSeconds(s => s + 1), 1000)
      return () => clearInterval(id)
    }, [running])

    const fmt = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`

    return h('div', null,
      h('div', { className: 'timer-display' }, fmt(seconds)),
      h('div', { style: { textAlign: 'center', marginTop: '8px' } },
        h('button', { onClick: () => setRunning(r => !r) }, running ? '暂停' : '开始'),
        h('button', { onClick: () => { setRunning(false); setSeconds(0) }, className: 'ghost' }, '重置'),
      )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 4：useReducer —— 复杂状态管理
  // ─────────────────────────────────────────────────────────────
  const cartReducer = (state, action) => {
    switch (action.type) {
      case 'ADD': {
        const exists = state.items.find(i => i.id === action.item.id)
        return {
          ...state,
          items: exists
            ? state.items.map(i => i.id === action.item.id ? { ...i, qty: i.qty + 1 } : i)
            : [...state.items, { ...action.item, qty: 1 }]
        }
      }
      case 'REMOVE': return { ...state, items: state.items.filter(i => i.id !== action.id) }
      case 'CLEAR':  return { items: [] }
      default:       return state
    }
  }

  const PRODUCTS = [
    { id: 1, name: '键盘',  price: 299  },
    { id: 2, name: '鼠标',  price: 149  },
    { id: 3, name: '显示器', price: 1299 },
  ]

  function ShoppingCart() {
    const [cart, dispatch] = useReducer(cartReducer, { items: [] })
    const total = cart.items.reduce((sum, i) => sum + i.price * i.qty, 0)

    return h('div', null,
      h('div', { style: { marginBottom: '10px' } },
        PRODUCTS.map(p =>
          h('button', {
            key: p.id,
            onClick: () => dispatch({ type: 'ADD', item: p }),
            className: 'ghost',
            style: { marginBottom: '4px', display: 'block', width: '100%', textAlign: 'left' },
          }, `＋ ${p.name} ¥${p.price}`)
        )
      ),
      cart.items.length === 0
        ? h('p', { style: { color: '#555', fontSize: '0.85rem' } }, '购物车为空')
        : h('div', null,
            cart.items.map(item =>
              h('div', { key: item.id, className: 'todo-item' },
                h('span', { style: { flex: 1 } }, `${item.name} × ${item.qty}`),
                h('span', { style: { color: '#6ee7f7', marginRight: '8px' } }, `¥${item.price * item.qty}`),
                h('button', { onClick: () => dispatch({ type: 'REMOVE', id: item.id }), className: 'danger', style: { padding: '2px 8px', fontSize: '0.75rem' } }, '×'),
              )
            ),
            h('div', { style: { borderTop: '1px solid #333', paddingTop: '8px', marginTop: '4px', display: 'flex', justifyContent: 'space-between' } },
              h('strong', null, '合计'),
              h('strong', { style: { color: '#6ee7f7' } }, `¥${total}`),
            ),
            h('button', { onClick: () => dispatch({ type: 'CLEAR' }), className: 'ghost', style: { marginTop: '8px', width: '100%' } }, '清空购物车'),
          )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 5：useMemo + useCallback —— 性能优化
  // ─────────────────────────────────────────────────────────────
  function ExpensiveDemo() {
    const [num, setNum]   = useState(10)
    const [other, setOther] = useState(0)
    const [log, setLog]   = useState([])

    // useMemo：只有 num 变化时才重新计算（纯计算，无副作用）
    const fib = useMemo(() => {
      const n = Math.min(num, 35)
      const calc = x => x <= 1 ? x : calc(x - 1) + calc(x - 2)
      return calc(n)
    }, [num])

    // 副作用必须放 useEffect，不能在 useMemo 内调用 setState
    useEffect(() => {
      setLog(prev => [`计算 fib(${Math.min(num, 35)}) = ${fib}`, ...prev.slice(0, 4)])
    }, [fib])

    // useCallback：deps 为 []，函数永远不重新创建
    const handleNum = useCallback(e => setNum(Number(e.target.value)), [])

    return h('div', null,
      h('label', { style: { fontSize: '0.8rem', color: '#888' } }, `fib(N)，N = ${num}`),
      h('input', { type: 'number', value: num, min: 1, max: 35, onInput: handleNum }),
      h('div', { style: { fontSize: '1.2rem', color: '#6ee7f7', margin: '6px 0' } }, `结果：${fib}`),
      h('button', { onClick: () => setOther(o => o + 1), className: 'ghost', style: { fontSize: '0.8rem' } },
        `触发无关渲染（${other}次）—— fib 不会重算`),
      h('div', { className: 'log' },
        log.map((l, i) => h('p', { key: i }, l))
      )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 6：useRef —— 访问 DOM + 存储不触发渲染的值
  // ─────────────────────────────────────────────────────────────
  function RefDemo() {
    const inputRef    = useRef(null)
    const renderCount = useRef(0)
    const [text, setText] = useState('')

    renderCount.current++

    useEffect(() => {
      if (inputRef.current) inputRef.current.focus()
    }, [])

    return h('div', null,
      h('p', { style: { fontSize: '0.8rem', color: '#888', marginBottom: '6px' } },
        `组件已渲染 ${renderCount.current} 次（ref 记录，不触发重渲染）`),
      h('input', {
        type: 'text',
        ref: inputRef,
        value: text,
        onInput: e => setText(e.target.value),
        placeholder: '自动聚焦，输入内容…',
      }),
      h('div', { style: { marginTop: '6px' } },
        h('button', { onClick: () => { setText(''); if (inputRef.current) inputRef.current.focus() }, className: 'ghost' },
          '清空并聚焦'),
      ),
      h('p', { style: { marginTop: '8px', color: '#6ee7f7' } },
        text ? `你输入了：${text}` : '等待输入…')
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 7：Context —— 跨层级传值
  // ─────────────────────────────────────────────────────────────
  const ThemeContext = createContext('dark')

  function ThemedButton({ label, onClick }) {
    const theme = useContext(ThemeContext)
    const isDark = theme === 'dark'
    return h('button', {
      onClick,
      style: {
        background:   isDark ? '#1e1e2e' : '#f1f5f9',
        color:        isDark ? '#e8e8f0' : '#1e293b',
        border:       `1px solid ${isDark ? '#444' : '#cbd5e1'}`,
        borderRadius: '6px',
        padding:      '6px 14px',
        cursor:       'pointer',
        margin:       '3px',
      }
    }, label)
  }

  function DeepChild() {
    const theme = useContext(ThemeContext)
    return h('div', {
      className: 'ctx-box',
      style: {
        background: theme === 'dark' ? '#0f172a' : '#f8fafc',
        color:      theme === 'dark' ? '#94a3b8' : '#475569',
        border:     `1px solid ${theme === 'dark' ? '#1e293b' : '#e2e8f0'}`,
        marginTop:  '10px',
      }
    }, `深层子组件读取到主题：${theme}`)
  }

  function ContextDemo() {
    const [theme, setTheme] = useState('dark')

    return h(ThemeContext.Provider, { value: theme },
      h('div', null,
        h('p', { style: { fontSize: '0.8rem', color: '#888', marginBottom: '8px' } },
          '通过 Context 传递主题，无需 prop drilling'),
        h(ThemedButton, { label: `切换主题（当前：${theme}）`, onClick: () => setTheme(t => t === 'dark' ? 'light' : 'dark') }),
        h(DeepChild, null),
      )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 8：组件组合 —— 进度条 + 父子通信
  // ─────────────────────────────────────────────────────────────
  function ProgressBar({ value }) {
    return h('div', { className: 'progress' },
      h('div', { className: 'progress-bar', style: { width: `${value}%` } })
    )
  }

  function ProgressDemo() {
    const [value, setValue] = useState(60)
    const [logs, setLogs]   = useState(['初始进度：60%'])

    const set = v => {
      const c = Math.max(0, Math.min(100, v))
      setValue(c)
      setLogs(prev => [`设置进度：${c}%`, ...prev.slice(0, 4)])
    }

    return h('div', null,
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '6px' } },
        h('span', { style: { color: '#6ee7f7', fontWeight: 'bold', minWidth: '3em' } }, `${value}%`),
        h(ProgressBar, { value }),
      ),
      h('div', null,
        h('button', { onClick: () => set(0),   className: 'ghost' }, '0%'),
        h('button', { onClick: () => set(25),  className: 'ghost' }, '25%'),
        h('button', { onClick: () => set(50),  className: 'ghost' }, '50%'),
        h('button', { onClick: () => set(75),  className: 'ghost' }, '75%'),
        h('button', { onClick: () => set(100),  className: 'ghost'}, '100%'),
      ),
      h('div', { className: 'log' },
        logs.map((l, i) => h('p', { key: i }, l))
      )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 9：条件渲染 / Tabs
  // ─────────────────────────────────────────────────────────────
  const TABS = [
    { id: 'fiber',    label: 'Fiber 架构',  content: 'Fiber 是 React 16 引入的新协调引擎。每个组件对应一个 Fiber 节点，形成链表树。工作循环逐个处理 Fiber，可以随时中断（时间切片），让浏览器有机会响应用户交互。' },
    { id: 'hooks',    label: 'Hooks',       content: 'Hooks 让函数组件拥有状态和副作用。它们依赖调用顺序（禁止在条件语句中调用）。每个 Hook 对应 Fiber 的 hooks 数组中的一个元素，渲染时按顺序读写。' },
    { id: 'reconcil', label: 'Reconciler', content: 'Reconciler 是 Diff 算法的实现。对比旧 Fiber 树和新 Element 列表，标记 PLACEMENT / UPDATE / DELETION，最后在 Commit 阶段批量更新 DOM，减少重排重绘。' },
  ]

  function Tabs() {
    const [active, setActive] = useState('fiber')
    const tab = TABS.find(t => t.id === active)

    return h('div', null,
      h('div', { style: { display: 'flex', gap: '6px', marginBottom: '12px' } },
        TABS.map(t =>
          h('button', {
            key: t.id,
            onClick: () => setActive(t.id),
            style: {
              background: active === t.id ? '#6366f1' : 'transparent',
              border:     `1px solid ${active === t.id ? '#6366f1' : '#444'}`,
              color:      active === t.id ? '#fff' : '#aaa',
              margin: 0,
            }
          }, t.label)
        )
      ),
      h('p', { style: { fontSize: '0.85rem', color: '#b0b0c0', lineHeight: 1.7 } }, tab.content)
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 10：memo —— props 不变时跳过组件函数执行
  // ─────────────────────────────────────────────────────────────
  const MemoNumberView = memo(function MemoNumberView({ num }) {
    const renderCount = useRef(0)
    renderCount.current++

    return h('div', { className: 'memo-panel' },
      h('div', null, `memo 子组件渲染次数：${renderCount.current}`),
      h('div', { style: { color: '#6ee7f7', fontSize: '1.1rem', marginTop: '4px' } },
        `收到的 num：${num}`),
    )
  })

  function MemoDemo() {
    const [num, setNum]     = useState(1)
    const [other, setOther] = useState(0)

    return h('div', null,
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' } },
        h('span', { style: { minWidth: '4em', color: '#6ee7f7', fontWeight: 700 } }, num),
        h('button', { onClick: () => setNum(n => n + 1), style: { margin: 0 } }, '改变 num'),
      ),
      h(MemoNumberView, { num }),
      h('button', { onClick: () => setOther(o => o + 1), className: 'ghost', style: { fontSize: '0.8rem' } },
        `只更新父组件（${other}次）`),
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 11：useLayoutEffect —— DOM 更新后同步执行
  // ─────────────────────────────────────────────────────────────
  function LayoutEffectDemo() {
    const [items, setItems] = useState(['苹果', '香蕉', '橙子'])
    const [height, setHeight] = useState(0)
    const listRef = useRef(null)

    // useLayoutEffect：DOM 突变后立即同步执行，浏览器还未绘制
    // 在这里读取 offsetHeight，保证拿到的是本次更新后的真实高度
    // 如果用 useEffect，可能先看到旧高度再闪烁到新高度
    useLayoutEffect(() => {
      if (listRef.current) setHeight(listRef.current.offsetHeight)
    }, [items])

    const add    = () => setItems(prev => [...prev, `项目 ${prev.length + 1}`])
    const remove = () => setItems(prev => prev.length > 1 ? prev.slice(0, -1) : prev)

    return h('div', null,
      h('p', { style: { fontSize: '0.8rem', color: '#6ee7f7', marginBottom: '8px' } },
        `useLayoutEffect 同步测量列表高度：${height}px`),
      h('p', { style: { fontSize: '0.75rem', color: '#555', marginBottom: '8px' } },
        '测量在浏览器绘制前完成，不会出现高度闪烁'),
      h('div', { ref: listRef, style: { background: '#111', borderRadius: '6px', padding: '8px', marginBottom: '10px' } },
        items.map((item, i) =>

  function UseIdDemo() {

  // ─────────────────────────────────────────────────────────────
  // Demo 13：flushSync —— 同步提交，立即读取更新后 DOM
  // ─────────────────────────────────────────────────────────────
  function FlushSyncDemo() {
    const [messages, setMessages] = useState([
      '消息 1：欢迎使用 Mini React！',
    ])
    const bottomRef = useRef(null)
    const countRef  = useRef(1)

    // 同步添加：flushSync 内的 setState 立即提交 DOM
    // 函数返回后 DOM 已更新，scrollIntoView 能滚动到最新消息
    const addSync = () => {
      countRef.current++
      flushSync(() => {
        setMessages(prev => [...prev, `消息 ${countRef.current}（同步添加）`])
      })
      // flushSync 返回后 DOM 已就绪，立即滚动到底部
      bottomRef.current?.scrollIntoView({ behavior: 'smooth' })
    }

    // 异步添加：普通 setState，DOM 在下一帧更新
    // 此时调用 scrollIntoView 滚动的是旧 DOM，无法到达最新消息
    const addAsync = () => {
      countRef.current++
      setMessages(prev => [...prev, `消息 ${countRef.current}（异步添加）`])
      // 此时 DOM 还未更新，scrollIntoView 位置不准
      bottomRef.current?.scrollIntoView({ behavior: 'smooth' })
    }

    return h('div', null,
      h('p', { style: { fontSize: '0.75rem', color: '#555', marginBottom: '8px' } },
        '同步添加后能精准滚动到底部；异步添加因 DOM 尚未更新，滚动位置偏差一条'),
      h('div', { className: 'msg-list' },
        messages.map((m, i) => h('div', { key: i, className: 'msg-item' }, m)),
        h('div', { ref: bottomRef }),
      ),
      h('div', null,
        h('button', { onClick: addSync }, '同步添加（flushSync）'),
        h('button', { onClick: addAsync, className: 'ghost' }, '异步添加'),
      )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 14：forwardRef + useImperativeHandle —— 暴露子组件命令式 API
  // ─────────────────────────────────────────────────────────────
  // forwardRef 让父组件通过 ref 拿到子组件暴露的命令式接口
  // useImperativeHandle 精确控制暴露的内容（不直接暴露 DOM 节点）
  const FancyInput = forwardRef(function FancyInput({ label }, ref) {
    const inputRef = useRef(null)
    const [value, setValue] = useState('')

    // 向父组件暴露 focus / reset / getValue 三个命令
    useImperativeHandle(ref, () => ({
      focus:    () => inputRef.current?.focus(),
      reset:    () => setValue(''),
      getValue: () => value,
    }), [value])

    return h('div', null,
      h('label', null, label),
      h('input', {
        ref: inputRef,
        type: 'text',
        value,
        onInput: e => setValue(e.target.value),
        placeholder: '父组件可调用 focus / reset…',
      })
    )
  })

  // ─────────────────────────────────────────────────────────────
  // Demo 16：Error Boundary —— 捕获子树渲染错误
  // ─────────────────────────────────────────────────────────────
  // Error Boundary 必须是类组件，函数组件不能成为边界
  class ErrorBoundaryDemo extends Component {
    constructor(props) {
      super(props)
      this.state = { hasError: false, error: null }
    }

    // 渲染阶段同步调用：返回 partial state 用于渲染错误 UI
    static getDerivedStateFromError(error) {
      return { hasError: true, error }
    }

    // commit 阶段调用：适合上报错误日志（Sentry 等）
    componentDidCatch(error, info) {
      console.error('[ErrorBoundary] caught:', error, info)
    }

    render() {
      if (this.state.hasError) {
        return h('div', {
          style: {
            background: '#2a1a1a', border: '1px solid #ef4444',
            borderRadius: '8px', padding: '12px',
          }
        },
          h('p', { style: { color: '#ef4444', fontWeight: 600 } }, '⚠ 组件崩溃'),
          h('p', { style: { color: '#888', fontSize: '0.8rem', margin: '4px 0 10px' } },
            this.state.error?.message),
          h('button', {
            onClick: () => this.setState({ hasError: false, error: null })
          }, '重试')
        )
      }
      return this.props.children
    }
  }

  // 会随机崩溃的子组件——用于演示错误边界捕获
  function BuggyChild({ shouldCrash }) {
    if (shouldCrash) throw new Error('组件故意抛出的错误！')
    return h('p', { style: { color: '#6ee7f7' } }, '子组件正常渲染 ✓')

  // ─────────────────────────────────────────────────────────────
  // Demo 17：useTransition —— 低优先级过渡更新
  // ─────────────────────────────────────────────────────────────
  // isPending 在 startTransition 回调执行期间为 true
  // 适合场景：搜索过滤、页面路由切换等耗时更新
  function TransitionDemo() {
    const [query, setQuery]   = useState('')
    const [list, setList]     = useState([])
    const [isPending, startTransition] = useTransition()

    const ALL_ITEMS = Array.from({ length: 500 }, (_, i) => `Item ${i + 1}`)

    const handleChange = e => {
      const q = e.target.value
      setQuery(q)
      // 搜索列表过滤标记为低优先级过渡
      startTransition(() => {
        setList(q ? ALL_ITEMS.filter(s => s.toLowerCase().includes(q.toLowerCase())) : [])
      })
    }

    return h('div', null,
      h('input', {
        type: 'text',
        value: query,
        onInput: handleChange,
        placeholder: '输入搜索词（从 500 项中过滤）…',
      }),
      isPending
        ? h('p', { style: { color: '#a78bfa', fontSize: '0.8rem' } }, '⏳ 更新中…')
        : h('p', { style: { color: '#555', fontSize: '0.8rem' } },
            query ? `找到 ${list.length} 项` : '请输入关键词'),
      h('div', {
        style: { maxHeight: '120px', overflowY: 'auto', marginTop: '6px' }
      },
        list.slice(0, 20).map(item =>
          h('div', { key: item, style: { padding: '3px 0', fontSize: '0.82rem', color: '#94a3b8', borderBottom: '1px solid #1e293b' } }, item)
        )
      )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 18：useSyncExternalStore —— 订阅外部 store
  // ─────────────────────────────────────────────────────────────
  // 模拟一个最小 Flux/Redux-like store（可在组件树外部独立运行）
  const counterStore = (() => {
    let state     = { count: 0, step: 1 }
    const listeners = new Set()

    const notify = () => listeners.forEach(fn => fn())

    return {
      // getSnapshot：纯函数，返回当前状态（useSyncExternalStore 每次渲染都会调用）
      getSnapshot: () => state,
      // subscribe：接收回调，返回取消订阅函数
      subscribe: cb => { listeners.add(cb); return () => listeners.delete(cb) },
      increment: () => { state = { ...state, count: state.count + state.step }; notify() },
      decrement: () => { state = { ...state, count: state.count - state.step }; notify() },
      setStep:   s  => { state = { ...state, step: s }; notify() },
      reset:     ()  => { state = { count: 0, step: state.step }; notify() },
    }
  })()

  function ExternalStoreDemo() {
    // useSyncExternalStore：store 在 React 树外部管理，组件直接订阅
    const { count, step } = useSyncExternalStore(
      counterStore.subscribe,
      counterStore.getSnapshot,
    )

    return h('div', null,
      h('div', { className: 'count-display' }, count),
      h('p', { style: { textAlign: 'center', fontSize: '0.8rem', color: '#888', margin: '4px 0 10px' } },
        `步进：${step}`),
      h('div', { style: { textAlign: 'center' } },
        h('button', { onClick: counterStore.decrement }, '−'),
        h('button', { onClick: counterStore.reset, className: 'ghost' }, '重置'),
        h('button', { onClick: counterStore.increment }, '+'),
      ),
      h('div', { style: { display: 'flex', gap: '6px', marginTop: '10px', alignItems: 'center' } },
        h('span', { style: { fontSize: '0.8rem', color: '#888' } }, '步进：'),
        h('button', { className: 'ghost', onClick: () => counterStore.setStep(1)  }, '1'),
        h('button', { className: 'ghost', onClick: () => counterStore.setStep(5)  }, '5'),
        h('button', { className: 'ghost', onClick: () => counterStore.setStep(10) }, '10'),
      )
    )
  }

  // ─────────────────────────────────────────────────────────────

  // lazy() 接收一个返回 Promise<{default: Component}> 的 factory
  // Suspense 在 Promise 未 resolve 前展示 fallback

              bars.map((h_, i) =>
                h('div', {
                  key: i,
                  style: {
                    flex: 1, height: `${h_}%`,
                    background: `hsl(${220 + i * 15}, 70%, 60%)`,

              '图表加载完成 ✓')
          )
        }
      })
    }, 2000)
  }))

  function SuspenseDemo() {
    const [show, setShow] = useState(false)

    return h('div', null,
      h('p', { style: { fontSize: '0.8rem', color: '#888', marginBottom: '8px' } },

  // ─────────────────────────────────────────────────────────────
  // Demo 20：PureComponent + 类组件生命周期
  // ─────────────────────────────────────────────────────────────
  // PureComponent 自带浅比较 shouldComponentUpdate，props/state 未变时跳过渲染
  class LifecycleChild extends PureComponent {
    constructor(props) {
      super(props)
      this.state = { localCount: 0 }
      this.renderCount = 0
    }

    componentDidMount() {
      // 挂载后执行（等价于 useEffect(fn, [])）
      this.setState({ localCount: 1 })
    }

    componentDidUpdate(prevProps, prevState) {
      // 仅在 props.value 真正变化时记录（PureComponent 已做浅比较）
      if (prevProps.value !== this.props.value) {
        console.log(`[LifecycleChild] props.value: ${prevProps.value} → ${this.props.value}`)
      }
    }

    componentWillUnmount() {
      console.log('[LifecycleChild] unmounted')
    }

    render() {
      this.renderCount++
      return h('div', { className: 'memo-panel' },
        h('div', null, `PureComponent 渲染次数：${this.renderCount}`),
        h('div', { style: { color: '#6ee7f7', fontSize: '1.1rem', marginTop: '4px' } },
          `props.value = ${this.props.value}`),
        h('div', { style: { color: '#a78bfa', fontSize: '0.85rem', marginTop: '4px' } },
          `state.localCount = ${this.state.localCount}`),
      )
    }
  }

  function ClassComponentDemo() {
    const [value, setValue]   = useState(1)
    const [unrelated, setU]   = useState(0)

    return h('div', null,
      h(LifecycleChild, { value }),
      h('div', { style: { marginTop: '10px' } },
        h('button', { onClick: () => setValue(v => v + 1) },
          '改变 props.value'),
        h('button', {
          className: 'ghost',
          onClick: () => setU(u => u + 1)
        }, `仅更新父组件（${unrelated}次）`),
      ),
      h('p', { style: { fontSize: '0.75rem', color: '#555', marginTop: '8px' } },
        'PureComponent 会跳过 props/state 均未变化的渲染'),
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 21：useInsertionEffect —— CSS-in-JS 样式注入
  // ─────────────────────────────────────────────────────────────
  // 模拟 styled-components / Emotion：在 DOM 插入前注入动态样式
  // useInsertionEffect 是三类 effect 中执行最早的（甚至早于 useLayoutEffect）
  function InsertionEffectDemo() {
    const [color, setColor]  = useState('#6366f1')
    const [size, setSize]    = useState(16)
    const styleRef           = useRef(null)

    // 模拟 CSS-in-JS：每次 color/size 变化时动态注入 <style>
    useInsertionEffect(() => {
      if (!styleRef.current) {
        styleRef.current = document.createElement('style')
        document.head.appendChild(styleRef.current)
      }
      // 直接写入 cssText（真实 CSS-in-JS 库会生成唯一类名）
      styleRef.current.textContent = `
        .dynamic-text {
          color: ${color};
          font-size: ${size}px;
          font-weight: bold;
          padding: 8px;
          border-left: 3px solid ${color};
          transition: all 0.2s;
        }
      `
      return () => {
        // cleanup：移除注入的样式（组件卸载时）
        if (styleRef.current?.parentNode) {
          styleRef.current.parentNode.removeChild(styleRef.current)
          styleRef.current = null
        }
      }
    }, [color, size])

    const COLORS = ['#6366f1', '#06b6d4', '#10b981', '#f59e0b', '#ef4444']

    return h('div', null,
      h('p', { className: 'dynamic-text' }, 'useInsertionEffect 动态注入的样式'),
      h('div', { style: { marginBottom: '8px' } },
        COLORS.map(c =>
          h('button', {
            key: c,
            onClick: () => setColor(c),
            style: {
              background: c, border: 'none',
              width: '24px', height: '24px',
              borderRadius: '50%', margin: '2px',
              cursor: 'pointer',
              outline: c === color ? '2px solid white' : 'none',
              outlineOffset: '2px',
            }
          }, '')
        )
      ),
      h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } },
        h('span', { style: { fontSize: '0.8rem', color: '#888' } }, '字号：'),
        h('button', { className: 'ghost', onClick: () => setSize(s => Math.max(12, s - 2)) }, '−'),
        h('span', { style: { color: '#6ee7f7', minWidth: '3em', textAlign: 'center' } }, `${size}px`),
        h('button', { className: 'ghost', onClick: () => setSize(s => Math.min(28, s + 2)) }, '+'),
      )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 22：useDeferredValue —— 延迟更新昂贵子树
  // ─────────────────────────────────────────────────────────────
  // 高频输入立即响应（input 受控值），昂贵列表在主线程空闲后再更新
  // 与 useTransition 的区别：useTransition 包"更新动作"，useDeferredValue 包"派生值"
  function HeavyList({ filter }) {
    // 模拟昂贵渲染：每个项目都做一次 fib 计算
    const items = useMemo(() => {
      const fib = n => n <= 1 ? n : fib(n - 1) + fib(n - 2)
      return Array.from({ length: 200 }, (_, i) => `${filter}-${i + 1}（${fib(20)}）`)
    }, [filter])
    return h('div', { style: { maxHeight: '120px', overflowY: 'auto' } },
      items.slice(0, 30).map((s, i) =>
        h('div', { key: i, style: { padding: '2px 0', fontSize: '0.78rem', color: '#94a3b8' } }, s)
      )
    )
  }
  const HeavyListMemo = memo(HeavyList)

  function DeferredValueDemo() {
    const [text, setText] = useState('')
    // deferred 值在高优先级渲染后才更新到最新值，让输入光标先丝滑响应
    const deferred = useDeferredValue(text)
    const isStale  = text !== deferred

    return h('div', null,
      h('p', { style: { fontSize: '0.8rem', color: '#888', marginBottom: '6px' } },
        '快速连续输入：输入框瞬时响应，下方列表延迟跟进'),
      h('input', {
        type: 'text',
        value: text,
        onInput: e => setText(e.target.value),
        placeholder: '输入任意内容…',
      }),
      h('p', {
        style: {
          fontSize: '0.75rem',
          color: isStale ? '#a78bfa' : '#555',
          margin: '4px 0 8px',
        }
      }, isStale ? '⏳ 列表正在跟进…' : `当前显示：${deferred || '(空)'}`),
      h(HeavyListMemo, { filter: deferred || 'item' })
    )
  }

  // ═════════════════════════════════════════════════════════════

  // ─────────────────────────────────────────────────────────────
  // Demo 23：use() —— 在渲染中读取 Promise
  // ─────────────────────────────────────────────────────────────
  // use() 把"未 resolve 的 Promise"抛出，由最近的 Suspense 接住显示 fallback
  function makeUserPromise(id) {
    return new Promise(resolve => {
      setTimeout(() => resolve({
        id,
        name: ['Alice', 'Bob', 'Carol'][id % 3],
        avatar: ['🎨', '🚀', '🦊'][id % 3],
      }), 1500)
    })
  }
  // 关键：Promise 必须在组件外创建（同一个引用复用），否则每次渲染都挂起
  let _userPromiseCache = makeUserPromise(0)

  function UserCard() {
    // use() 直接读 Promise 拿到结果（pending 时抛出触发 Suspense）
    const user = use(_userPromiseCache)
    return h('div', { style: { padding: '12px', background: '#111', borderRadius: '8px' } },
      h('div', { style: { fontSize: '2rem', textAlign: 'center' } }, user.avatar),
      h('div', { style: { textAlign: 'center', color: '#6ee7f7', marginTop: '4px' } },
        `${user.name} (id=${user.id})`)
    )
  }

  function UseHookDemo() {
    const [tick, setTick] = useState(0)
    const reload = () => {
      _userPromiseCache = makeUserPromise(tick + 1)
      setTick(t => t + 1)
    }
    return h('div', null,
      h('p', { style: { fontSize: '0.8rem', color: '#888', marginBottom: '8px' } },
        'use() 直接读 Promise，未完成时由 Suspense 显示 fallback'),
      h(Suspense, {
        key: tick,  // 切换 key 强制重新挂载
        fallback: h('p', { style: { color: '#a78bfa', textAlign: 'center', padding: '20px' } },
          '⏳ 加载用户中…'),
      }, h(UserCard, null)),
      h('button', { onClick: reload, style: { marginTop: '10px' } }, '重新加载')

  // ─────────────────────────────────────────────────────────────
  // Demo 24：useOptimistic —— 乐观 UI 更新
  // ─────────────────────────────────────────────────────────────
  function OptimisticDemo() {
    const [messages, setMessages] = useState([
      { id: 1, text: '欢迎来到 Mini React！', sending: false },
    ])
    // useOptimistic：在真实 state 之上叠加待定消息
    const [optimisticMessages, addOptimistic] = useOptimistic(
      messages,
      (state, payload) => [...state, { id: payload.id, text: payload.text, sending: true }],
    )
    const [text, setText] = useState('')

    const send = async () => {
      if (!text.trim()) return
      const tempId = Date.now()
      const content = text.trim()
      setText('')
      // 1. 立刻显示"发送中"消息（乐观更新）
      addOptimistic({ id: tempId, text: content })
      // 2. 模拟网络延迟（1.2 秒）
      await new Promise(r => setTimeout(r, 1200))
      // 3. 服务器响应：写入真实 state（乐观状态自动作废）
      setMessages(prev => [...prev, { id: tempId, text: content, sending: false }])
    }

    return h('div', null,
      h('p', { style: { fontSize: '0.8rem', color: '#888', marginBottom: '8px' } },
        '点击发送：消息立刻出现（半透明），1.2 秒后转为已发送'),
      h('div', { className: 'msg-list' },
        optimisticMessages.map(m =>
          h('div', { key: m.id, className: 'msg-item',
            style: { opacity: m.sending ? 0.5 : 1, color: m.sending ? '#a78bfa' : '#94a3b8' }
          }, `${m.sending ? '⏳ ' : '✓ '} ${m.text}`)
        )
      ),
      h('div', { style: { display: 'flex', gap: '6px' } },
        h('input', { type: 'text', value: text, onInput: e => setText(e.target.value),
          onKeyDown: e => e.key === 'Enter' && send(), style: { flex: 1, marginBottom: 0 },
          placeholder: '输入并回车发送…' }),
        h('button', { onClick: send, style: { margin: 0 } }, '发送')
      )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 25：useActionState —— 表单 action

  function ActionStateDemo() {
    // action(prevState, formData) → Promise<newState>
    const checkUsername = useCallback(async (prev, formData) => {
      const name = formData.get('username')
      await new Promise(r => setTimeout(r, 800))
      if (!name)              return { ok: false, msg: '用户名不能为空' }

      if (name === 'admin')   return { ok: false, msg: '该用户名已被占用' }

    }, [])

    const [state, dispatch, isPending] = useActionState(checkUsername, { ok: null, msg: '' })

    const onSubmit = e => {
      e.preventDefault()

      dispatch(fd)

    return h('form', { onSubmit },
      h('p', { style: { fontSize: '0.8rem', color: '#888', marginBottom: '8px' } },

      h('input', { type: 'text', name: 'username', placeholder: '输入用户名（试试 admin）',
        disabled: isPending }),
      h('button', { type: 'submit', disabled: isPending, style: { marginTop: '4px' } },
        isPending ? '检查中…' : '检查可用性'),
      state.msg && h('p', {

  // ─────────────────────────────────────────────────────────────
  // Demo 26：Profiler —— 渲染性能测量
  // ─────────────────────────────────────────────────────────────
  function ExpensiveTree({ count }) {
    // 故意做点耗时计算
    const items = []
    for (let i = 0; i < count; i++) {
      items.push(h('span', { key: i, style: {
        display: 'inline-block', width: '12px', height: '12px',
        margin: '1px', background: `hsl(${(i * 7) % 360}, 60%, 55%)`, borderRadius: '2px',
      }}))
    }
    return h('div', null, ...items)
  }

  function ProfilerDemo() {
    const [count, setCount] = useState(50)
    // ⚠️ 关键设计：日志写入 ref（不触发渲染），用独立 interval 把 ref 同步到显示状态。
    // 如果在 onRender 内直接 setState，会触发新的 render → 新的 commit
    // → Profiler.useLayoutEffect 再次触发 onRender → 死循环。
    const logsRef = useRef([])
    const [, force] = useReducer(s => s + 1, 0)

    const onRender = useCallback((id, phase, duration) => {
      logsRef.current = [
        `[${phase}] ${id} 用时 ${duration.toFixed(2)}ms`,
        ...logsRef.current.slice(0, 4)
      ]
    }, [])

    // 每 300ms 把 ref 同步到 UI，避免 onRender → setState → 渲染循环
    useEffect(() => {
      const id = setInterval(() => force(), 300)
      return () => clearInterval(id)
    }, [])

    return h('div', null,
      h('p', { style: { fontSize: '0.8rem', color: '#888', marginBottom: '6px' } },
        `渲染 ${count} 个色块，Profiler 统计耗时（日志每 300ms 刷新）`),
      h(Profiler, { id: 'ColorGrid', onRender },
        h(ExpensiveTree, { count })
      ),
      h('div', { style: { marginTop: '8px' } },
        h('button', { onClick: () => setCount(c => Math.min(2000, c + 50)) }, '+50'),
        h('button', { onClick: () => setCount(c => Math.max(10, c - 50)), className: 'ghost' }, '-50'),
        h('button', { onClick: () => setCount(50), className: 'ghost' }, '重置'),
      ),
      h('div', { className: 'log' },
        logsRef.current.map((l, i) => h('p', { key: i }, l))
      )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 29：createStore + 中间件 —— Redux 风格全局状态
  // ─────────────────────────────────────────────────────────────
  // Reducer：根据 action 计算新 state
  const todoReducer = (state = { items: [], filter: 'all' }, action) => {
    switch (action.type) {
      case 'ADD_TODO':
        return { ...state, items: [...state.items, { id: Date.now(), text: action.text, done: false }] }
      case 'TOGGLE_TODO':
        return { ...state, items: state.items.map(t => t.id === action.id ? { ...t, done: !t.done } : t) }
      case 'SET_FILTER':
        return { ...state, filter: action.filter }
      case 'CLEAR_DONE':
        return { ...state, items: state.items.filter(t => !t.done) }
      default: return state
    }
  }
  // 创建 store 时挂上 logger 中间件，所有 dispatch 自动 console.log
  const todoStore = createStore(todoReducer, undefined, [loggerMiddleware])

  function ReduxStyleDemo() {
    // 通过 useSyncExternalStore 订阅外部 store
    const state = useSyncExternalStore(todoStore.subscribe, todoStore.getState)
    const [text, setText] = useState('')

    const visible = state.items.filter(t =>
      state.filter === 'all' ? true : state.filter === 'done' ? t.done : !t.done
    )

    return h('div', null,
      h('p', { style: { fontSize: '0.75rem', color: '#555', marginBottom: '6px' } },
        'createStore + logger 中间件（dispatch 见 console）'),
      h('div', { style: { display: 'flex', gap: '6px', marginBottom: '6px' } },
        h('input', { type: 'text', value: text, onInput: e => setText(e.target.value),
          onKeyDown: e => {
            if (e.key === 'Enter' && text.trim()) {
              todoStore.dispatch({ type: 'ADD_TODO', text: text.trim() })
              setText('')
            }
          },
          style: { flex: 1, marginBottom: 0 }, placeholder: '回车添加' }),
      ),
      h('div', { style: { display: 'flex', gap: '4px', marginBottom: '6px' } },
        ['all', 'active', 'done'].map(f =>
          h('button', { key: f,
            className: state.filter === f ? '' : 'ghost',
            onClick: () => todoStore.dispatch({ type: 'SET_FILTER', filter: f }),
            style: { fontSize: '0.75rem', padding: '3px 8px', margin: 0 }
          }, f === 'all' ? '全部' : f === 'done' ? '已完成' : '未完成')
        ),
        h('button', { className: 'ghost', style: { fontSize: '0.75rem', padding: '3px 8px', margin: 0 },
          onClick: () => todoStore.dispatch({ type: 'CLEAR_DONE' }) }, '清除已完成')
      ),
      visible.length === 0
        ? h('p', { style: { color: '#555', fontSize: '0.8rem' } }, '空空如也')
        : visible.map(t =>
            h('div', { key: t.id, className: `todo-item${t.done ? ' done' : ''}` },
              h('input', { type: 'checkbox', checked: t.done,
                onChange: () => todoStore.dispatch({ type: 'TOGGLE_TODO', id: t.id }) }),
              h('span', { style: { flex: 1 } }, t.text)
            )
          )
    )
  }

  function CustomHooksDemo() {
    const [open, toggle, , close] = useToggle(false)
    const [text, setText]    = useState('')
    const debounced          = useDebounce(text, 500)
    const prevDebounced      = usePrevious(debounced)
    const { count, inc, dec, reset } = useCounter(0, { min: 0, max: 10 })

    return h('div', null,
      // useToggle
      h('div', { style: { marginBottom: '10px' } },
        h('button', { onClick: toggle }, open ? '收起' : '展开'),
        h('button', { onClick: close, className: 'ghost' }, '强制关闭'),
        open && h('p', { style: { color: '#6ee7f7', marginTop: '4px', fontSize: '0.85rem' } },
          '✓ useToggle 控制的内容')
      ),
      // useDebounce + usePrevious
      h('input', { type: 'text', value: text, onInput: e => setText(e.target.value),
        placeholder: '快速输入：500ms 防抖' }),
      h('p', { style: { fontSize: '0.78rem', color: '#94a3b8' } },
        `当前：${text || '(空)'}`),
      h('p', { style: { fontSize: '0.78rem', color: '#6ee7f7' } },
        `防抖：${debounced || '(空)'} ｜ 上次防抖：${prevDebounced ?? '(无)'}`),
      // useCounter
      h('div', { style: { marginTop: '10px', display: 'flex', alignItems: 'center', gap: '6px' } },
        h('span', { style: { color: '#a78bfa', minWidth: '6em', fontSize: '0.85rem' } },
          `Counter: ${count}`),
        h('button', { onClick: () => dec(), style: { margin: 0 } }, '−'),
        h('button', { onClick: () => inc(), style: { margin: 0 } }, '+'),
        h('button', { onClick: reset, className: 'ghost', style: { margin: 0 } }, '重置'),

  // ─────────────────────────────────────────────────────────────
  // Demo 36：useThrottle / useUpdateEffect / useForceUpdate
  // ─────────────────────────────────────────────────────────────
  function MiscHooksDemo() {
    const [pos, setPos] = useState({ x: 0, y: 0 })
    // 节流：每 100ms 最多更新一次
    const throttled = useThrottle(pos, 100)
    const [bigValue, setBig] = useState(1)
    const [updateLog, setLog] = useState([])
    // 跳过首次的 effect（仅在更新时打印）
    useUpdateEffect(() => {
      setLog(prev => [`bigValue 更新为 ${bigValue}`, ...prev.slice(0, 2)])
    }, [bigValue])
    const force = useForceUpdate()
    const renderCount = useRef(0)
    renderCount.current++

    return h('div', null,
      h('div', {
        onMouseMove: e => {
          const rect = e.currentTarget.getBoundingClientRect()
          setPos({ x: Math.round(e.clientX - rect.left), y: Math.round(e.clientY - rect.top) })
        },
        style: {
          height: '60px', background: '#0a0a14', borderRadius: '6px',
          padding: '8px', fontSize: '0.78rem', color: '#94a3b8',
          marginBottom: '8px', cursor: 'crosshair',
        }
      },
        h('p', null, `当前坐标：(${pos.x}, ${pos.y})`),
        h('p', { style: { color: '#6ee7f7' } },
          `节流坐标 (100ms)：(${throttled.x}, ${throttled.y})`),
      ),
      h('div', { style: { marginBottom: '8px' } },
        h('button', { onClick: () => setBig(v => v * 2) }, `bigValue × 2 (=${bigValue})`),
        h('button', { onClick: force, className: 'ghost' },
          `forceUpdate（已渲染 ${renderCount.current} 次）`),
      ),
      h('div', { className: 'log' },
        updateLog.length === 0
          ? h('p', null, '修改 bigValue 触发 useUpdateEffect…')
          : updateLog.map((l, i) => h('p', { key: i }, l))
      )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // Demo 37：useMediaQuery —— 响应式断点
  // ─────────────────────────────────────────────────────────────
  function MediaQueryDemo() {
    const isMobile = useMediaQuery('(max-width: 640px)')
    const isWide   = useMediaQuery('(min-width: 1024px)')
    const prefersDark = useMediaQuery('(prefers-color-scheme: dark)')

    return h('div', null,
      h('p', { style: { fontSize: '0.8rem', color: '#888', marginBottom: '8px' } },
        '调整窗口尺寸可以看到状态变化'),
      h('ul', { style: { fontSize: '0.85rem', color: '#94a3b8', listStyle: 'none' } },
        h('li', { style: { color: isMobile ? '#10b981' : '#555' } },
          `${isMobile ? '✓' : '✗'} 移动端 (≤ 640px)`),
        h('li', { style: { color: isWide ? '#10b981' : '#555' } },
          `${isWide ? '✓' : '✗'} 宽屏 (≥ 1024px)`),
        h('li', { style: { color: prefersDark ? '#10b981' : '#555' } },
          `${prefersDark ? '✓' : '✗'} 系统偏好深色`),
      )
    )
  }

  // ─────────────────────────────────────────────────────────────
  // 根组件：把所有 Demo 组合在一起
  // ─────────────────────────────────────────────────────────────
  function App() {
    const cards = [
      { title: 'Demo 1：useState',           desc: '基础状态管理，函数式更新',                 component: Counter          },
      { title: 'Demo 2：列表 + 条件渲染',    desc: 'map 渲染列表，条件表达式',                  component: TodoList         },
      { title: 'Demo 3：useEffect + 清理',   desc: '副作用、依赖数组、清理函数',                component: Timer            },
      { title: 'Demo 4：useReducer',          desc: '复杂状态机，dispatch / action',            component: ShoppingCart     },
      { title: 'Demo 5：useMemo + useCallback', desc: '跳过昂贵计算，稳定函数引用',             component: ExpensiveDemo    },
      { title: 'Demo 6：useRef',              desc: '访问 DOM / 存储无副作用的值',              component: RefDemo          },
      { title: 'Demo 7：Context',             desc: 'createContext / Provider / useContext',    component: ContextDemo      },
      { title: 'Demo 8：组件组合',            desc: '父子通信，props 传递',                      component: ProgressDemo     },
      { title: 'Demo 9：条件渲染 / Tabs',    desc: '按条件显示不同内容',                        component: Tabs             },
      { title: 'Demo 10：memo',              desc: 'props 未变化时跳过组件函数执行',             component: MemoDemo         },
      { title: 'Demo 11：useLayoutEffect',   desc: 'DOM 更新后、浏览器绘制前同步执行',          component: LayoutEffectDemo },
      { title: 'Demo 12：useId',             desc: '生成稳定唯一 ID，用于 label/input 关联',    component: UseIdDemo        },
      { title: 'Demo 13：flushSync',           desc: '同步提交更新，立即读取最新 DOM',                    component: FlushSyncDemo        },
      { title: 'Demo 14：forwardRef + useImperativeHandle', desc: '向父组件暴露子组件命令式 API',          component: ForwardRefDemo       },
      { title: 'Demo 15：createPortal',       desc: '将模态框渲染到 document.body',                       component: PortalDemo           },
      { title: 'Demo 16：Error Boundary',     desc: 'getDerivedStateFromError + componentDidCatch',       component: ErrorBoundaryWrapper },
      { title: 'Demo 17：useTransition',      desc: '低优先级过渡更新，isPending 指示器',                  component: TransitionDemo       },
      { title: 'Demo 18：useSyncExternalStore', desc: '订阅 React 树外部的 store（类 Redux）',            component: ExternalStoreDemo    },
      { title: 'Demo 19：Suspense + lazy',    desc: '懒加载组件，加载期间展示 fallback',                   component: SuspenseDemo         },
      { title: 'Demo 20：PureComponent + 生命周期', desc: '浅比较优化 + componentDidMount/Update/Unmount', component: ClassComponentDemo   },
      { title: 'Demo 21：useInsertionEffect', desc: 'CSS-in-JS 样式注入（最早副作用阶段）',               component: InsertionEffectDemo  },
      { title: 'Demo 22：useDeferredValue',   desc: '派生值延迟更新，高频输入不被昂贵子树阻塞',           component: DeferredValueDemo    },
      { title: 'Demo 23：use() + Suspense',   desc: 'React 19 风格：渲染中读取 Promise',                   component: UseHookDemo          },
      { title: 'Demo 24：useOptimistic',      desc: '乐观 UI：消息立刻显示，落库后转正',                   component: OptimisticDemo       },
      { title: 'Demo 25：useActionState',     desc: '表单 action：自带 isPending 与异步 reducer',          component: ActionStateDemo      },
      { title: 'Demo 26：Profiler',           desc: '测量子树渲染耗时，输出 mount/update 阶段',            component: ProfilerDemo         },
      { title: 'Demo 27：mergeRefs',          desc: '把多个 ref 合并到同一 DOM 节点',                       component: MergeRefsDemo        },
      { title: 'Demo 28：PropTypes',          desc: '运行时 prop 类型校验（错误见 console）',               component: PropTypesDemo        },
      { title: 'Demo 29：createStore',        desc: 'Redux 风格：reducer + middleware（logger 自动打印）',  component: ReduxStyleDemo       },
      { title: 'Demo 30：renderToString',     desc: 'SSR：把组件树序列化为 HTML 字符串',                    component: SSRDemo              },
      { title: 'Demo 31：自定义 hooks',       desc: 'useToggle / useDebounce / usePrevious / useCounter',   component: CustomHooksDemo      },
      { title: 'Demo 32：useInterval / useKeyPress', desc: '声明式 setInterval、键盘监听、窗口尺寸',         component: HooksObservabilityDemo },
      { title: 'Demo 33：useOnClickOutside / useHover', desc: '点击外部关闭、悬停检测',                        component: ClickOutsideHoverDemo  },
      { title: 'Demo 34：useLocalStorage',    desc: '与 localStorage 双向同步，刷新后状态保留',             component: LocalStorageDemo     },
      { title: 'Demo 35：useCopyToClipboard', desc: '一键复制到剪贴板',                                     component: CopyDemo             },
      { title: 'Demo 36：useThrottle / useUpdateEffect / useForceUpdate', desc: '节流坐标 / 跳过首次 effect / 强制重渲染', component: MiscHooksDemo },
      { title: 'Demo 37：useMediaQuery',      desc: '响应式断点检测，跟随窗口变化',                          component: MediaQueryDemo       },
    ]

    return h('div', { className: 'grid' },
      cards.map(({ title, desc, component: C }) =>
        h('div', { key: title, className: 'card' },
          h('h2', null, title),
          h('p', { className: 'desc' }, desc),
          h(C, null),
        )
      )
    )
  }

  render(h(App, null), document.getElementById('root'))
  </script>
</body>
</html>
